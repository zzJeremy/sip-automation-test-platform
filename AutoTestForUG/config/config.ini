# AutoTestForUG 配置文件
# config.ini - 主配置文件

[DEFAULT]
# 项目基本信息
project_name = AutoTestForUG
version = 1.0.0
description = 软交换系统自动化测试平台

[TEST_CLIENT]
# 测试客户端配置
sip_server_host = 192.168.30.66
sip_server_port = 5060
local_host = 127.0.0.1
local_port = 5080
protocol = UDP
max_concurrent_calls = 100
call_duration = 30
test_duration = 300
username = 670491
password = 1234
#register_domain = 192.168.30.66:5080

[TEST_SERVER]
# 测试服务器配置
server_host = 127.0.0.1
server_port = 5060
max_connections = 1000
response_timeout = 30
monitor_interval = 5

[MONITOR_CLIENT]
# 监控客户端配置
monitor_host = 127.0.0.1
monitor_port = 9999
cpu_threshold = 80
memory_threshold = 85
disk_threshold = 90
network_threshold = 1000
monitor_interval = 10
log_retention_days = 30

[BUSINESS_TEST]
# 业务功能测试配置
test_scenario_timeout = 60
retry_attempts = 3
retry_delay = 5
expected_response_time = 5
test_data_path = ./test_data/
report_output_path = ./reports/

[LOGGING]
# 日志配置
log_level = INFO
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_file = ./logs/autotest.log
log_max_size = 10MB
log_backup_count = 5

[REPORTING]
# 报告配置
report_format = html,excel,word
report_template_path = ./templates/
report_output_path = ./reports/
include_charts = true
chart_types = line,bar,pie
auto_email_report = false
email_recipients = admin@example.com

[EMAIL_REPORT]
# 邮件报告配置
enabled = false
smtp_server = smtp.example.com
smtp_port = 587
username = your_username
password = your_password
sender_email = sender@example.com
recipients = recipient1@example.com,recipient2@example.com