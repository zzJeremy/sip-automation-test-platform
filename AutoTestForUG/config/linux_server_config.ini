# SIP自动化测试平台Linux服务器配置文件
# 用于配置在Linux服务器环境中的运行参数

[DEFAULT]
# 默认配置部分

[LOGGING]
# 日志配置
log_level = INFO
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_file = /var/log/sip-auto-test/autotestforug.log
log_max_size = 10MB
log_backup_count = 5

[NETWORK]
# 网络配置
bind_address = 0.0.0.0
sip_port_range_start = 8000
sip_port_range_end = 9000
rtp_port_range_start = 10000
rtp_port_range_end = 11000
timeout = 30
max_connections = 1000

[SIP_SERVER]
# SIP服务器配置
server_host = 127.0.0.1
server_port = 5060
transport_protocol = UDP
username = test_user
password = test_password
realm = example.com

[TESTING]
# 测试配置
default_test_duration = 60
max_concurrent_tests = 10
enable_performance_monitoring = true
enable_security_tests = true
results_output_dir = /var/lib/sip-auto-test/results

[PERFORMANCE]
# 性能监控配置
monitor_interval = 5
cpu_threshold = 80
memory_threshold = 80
response_time_threshold = 2.0
call_success_threshold = 95

[SECURITY]
# 安全配置
enable_ssl = false
ssl_cert_path = /etc/ssl/certs/sip-test.crt
ssl_key_path = /etc/ssl/private/sip-test.key
allowed_ips = 127.0.0.1,10.0.0.0/8,192.168.0.0/16
max_login_attempts = 5