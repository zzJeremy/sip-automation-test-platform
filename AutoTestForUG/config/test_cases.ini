# AutoTestForUG 测试用例配置文件
# test_cases.ini - 测试用例配置

[CALL_SETUP_TEST]
# 呼叫建立测试用例
test_id = CALL_SETUP_001
test_name = SIP呼叫建立测试
test_description = 测试SIP呼叫建立流程，包括INVITE、180 Ringing、200 OK、ACK等消息
test_steps = 
    1.发送INVITE请求
    2.等待180 Ringing响应
    3.等待200 OK响应
    4.发送ACK确认
    5.建立通话连接
    6.保持通话指定时长
    7.发送BYE请求结束通话
    8.等待200 OK确认
expected_results = 
    INVITE请求成功发送
    收到180 Ringing响应
    收到200 OK响应
    通话连接建立成功
    BYE请求成功发送
    收到200 OK确认
test_data = 
    caller_uri = sip:caller@127.0.0.1:5060
    callee_uri = sip:callee@127.0.0.1:5060
    call_duration = 30
    codec = PCMU/8000
timeout = 60

[REGISTRATION_TEST]
# 注册测试用例
test_id = REG_001
test_name = SIP用户注册测试
test_description = 测试SIP用户注册流程，包括REGISTER请求和200 OK响应
test_steps = 
    1.构建REGISTER请求
    2.添加认证信息
    3.发送REGISTER请求
    4.等待200 OK响应
    5.验证注册状态
expected_results = 
    REGISTER请求成功发送
    收到200 OK响应
    用户注册成功
    注册信息正确
test_data = 
    user_uri = sip:test@127.0.0.1:5060
    username = test
    password = password
    expires = 3600
timeout = 30

[REGISTRATION_FAILURE_TEST]
# 注册失败测试用例
test_id = REG_FAIL_001
test_name = SIP用户注册失败测试
test_description = 测试SIP用户注册失败场景，如认证失败
test_steps = 
    1.构建REGISTER请求
    2.使用错误的认证信息
    3.发送REGISTER请求
    4.等待401 Unauthorized响应
    5.验证错误处理
expected_results = 
    REGISTER请求成功发送
    收到401 Unauthorized响应
    系统正确处理认证失败
test_data = 
    user_uri = sip:test@127.0.0.1:5060
    username = test
    password = wrongpassword
    expires = 3600
timeout = 30

[MESSAGE_TEST]
# 消息测试用例
test_id = MSG_001
test_name = SIP消息发送测试
test_description = 测试SIP MESSAGE消息发送和接收
test_steps = 
    1.构建MESSAGE请求
    2.设置消息内容
    3.发送MESSAGE请求
    4.等待200 OK响应
    5.验证消息接收
expected_results = 
    MESSAGE请求成功发送
    收到200 OK响应
    消息内容正确
    接收方收到消息
test_data = 
    sender_uri = sip:sender@127.0.0.1:5060
    receiver_uri = sip:receiver@127.0.0.1:5060
    message_body = Hello, this is a test message
    content_type = text/plain
timeout = 20

[TRANSFER_TEST]
# 呼叫转移测试用例
test_id = TRANSFER_001
test_name = SIP呼叫转移测试
test_description = 测试SIP呼叫转移功能
test_steps = 
    1.建立初始通话
    2.发送REFER请求进行转移
    3.等待202 Accepted响应
    4.验证呼叫转移
expected_results = 
    初始通话建立成功
    REFER请求成功发送
    收到202 Accepted响应
    呼叫成功转移
test_data = 
    original_caller = sip:caller@127.0.0.1:5060
    original_callee = sip:callee@127.0.0.1:5060
    transfer_to = sip:transfer@127.0.0.1:5060
    transfer_method = REFER
timeout = 60

[CONFERENCE_TEST]
# 会议呼叫测试用例
test_id = CONF_001
test_name = SIP会议呼叫测试
test_description = 测试SIP多方会议功能
test_steps = 
    1.建立第一个通话
    2.邀请第二个参与者
    3.邀请第三个参与者
    4.验证多方通话
    5.结束会议
expected_results = 
    所有参与者成功加入会议
    通话质量良好
    所有参与者可以听到彼此
    会议可以正常结束
test_data = 
    host_uri = sip:host@127.0.0.1:5060
    participant1_uri = sip:participant1@127.0.0.1:5060
    participant2_uri = sip:participant2@127.0.0.1:5060
    max_participants = 10
timeout = 120

[OPTIONS_TEST]
# OPTIONS测试用例
test_id = OPT_001
test_name = SIP OPTIONS请求测试
test_description = 测试SIP OPTIONS请求功能，查询服务器能力
test_steps = 
    1.构建OPTIONS请求
    2.设置目标URI
    3.发送OPTIONS请求
    4.等待200 OK响应
    5.验证服务器能力信息
expected_results = 
    OPTIONS请求成功发送
    收到200 OK响应
    响应包含服务器能力信息
    Supported、Allow等头域正确
test_data = 
    target_uri = sip:server@127.0.0.1:5060
    contact = sip:test@127.0.0.1:5061
timeout = 15

[BUSY_CALL_TEST]
# 忙线呼叫测试用例
test_id = BUSY_001
test_name = SIP忙线呼叫测试
test_description = 测试当被叫方忙线时的呼叫处理
test_steps = 
    1.建立一个通话（使被叫方忙线）
    2.尝试建立第二个到同一被叫的通话
    3.等待486 Busy Here响应
    4.验证错误处理
expected_results = 
    第一个通话建立成功
    第二个通话收到486 Busy Here响应
    系统正确处理忙线情况
test_data = 
    caller_uri = sip:caller@127.0.0.1:5060
    callee_uri = sip:busy_callee@127.0.0.1:5060
    simultaneous_calls = 2
timeout = 45

[TIMEOUT_TEST]
# 超时测试用例
test_id = TIMEOUT_001
test_name = SIP请求超时测试
test_description = 测试SIP请求超时处理机制
test_steps = 
    1.发送SIP请求到无响应的地址
    2.等待超时
    3.验证超时处理
expected_results = 
    请求发送成功
    在指定时间内超时
    系统正确处理超时
test_data = 
    target_uri = sip:timeout@192.168.999.999:5060  # 故意使用不可达地址
    request_type = INVITE
timeout = 35

[CONCURRENT_CALLS_TEST]
# 并发呼叫测试用例
test_id = CONCUR_001
test_name = SIP并发呼叫压力测试
test_description = 测试系统在高并发呼叫下的性能
test_steps = 
    1.同时发起多路呼叫
    2.监控系统资源使用
    3.验证呼叫建立成功率
    4.统计性能指标
expected_results = 
    大部分呼叫成功建立
    系统资源使用在可接受范围内
    呼叫建立时间合理
test_data = 
    concurrent_calls = 50
    call_duration = 10
    success_threshold = 90
timeout = 300

[CALL_HOLD_TEST]
# 呼叫保持测试用例
test_id = HOLD_001
test_name = SIP呼叫保持测试
test_description = 测试SIP呼叫保持和恢复功能
test_steps = 
    1.建立通话
    2.发送re-INVITE请求进行保持
    3.等待200 OK响应
    4.验证通话保持
    5.发送re-INVITE请求恢复通话
    6.等待200 OK响应
    7.验证通话恢复
expected_results = 
    通话建立成功
    保持请求成功处理
    恢复请求成功处理
    通话正常保持和恢复
test_data = 
    caller_uri = sip:caller@127.0.0.1:5060
    callee_uri = sip:callee@127.0.0.1:5060
    hold_duration = 15
timeout = 60

[DTMF_TEST]
# DTMF测试用例
test_id = DTMF_001
test_name = SIP DTMF信号测试
