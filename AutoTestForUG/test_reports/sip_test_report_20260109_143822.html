<!DOCTYPE html>
<html>
<head>
    <title>SIP 自动化测试报告</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { background-color: #f0f0f0; padding: 15px; border-radius: 5px; }
        .summary { background-color: #e8f4fd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .test-case { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 5px; }
        .passed { border-left: 5px solid #4CAF50; }
        .failed { border-left: 5px solid #f44336; }
        .error { border-left: 5px solid #ff9800; }
        .stats { display: inline-block; margin-right: 20px; }
        .stats-box { display: inline-flex; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SIP 自动化测试报告</h1>
        <p>生成时间: 2026-01-09 14:38:22</p>
    </div>
    
    <div class="summary">
        <h2>测试汇总</h2>
        <div class="stats-box">
            <div class="stats">
                <strong>总计:</strong> 0<br>
                <strong>通过:</strong> 0
            </div>
            <div class="stats">
                <strong>失败:</strong> 0<br>
                <strong>错误:</strong> 0
            </div>
            <div class="stats">
                <strong>成功率:</strong> 0.00%
            </div>
        </div>
    </div>
</body>
</html>
